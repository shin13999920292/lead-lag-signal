name: Update Lead-Lag Signal

on:
  schedule:
    # 毎日 UTC 22:00 = 日本時間 翌朝 7:00 に実行
    # 米国市場クローズ(日本時間6時頃)後、日本市場オープン(9時)前
    - cron: '0 22 * * 1-5'  # 月〜金のみ
  workflow_dispatch:  # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance numpy pandas scipy

      - name: Generate signal HTML
        run: python deploy.py --generate-only

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "update signal: $(date -u +%Y-%m-%d)"
          git push
